name: Lint - actionlint
on: [push, pull_request]

jobs:
  actionlint:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
      - run: go install github.com/rhysd/actionlint/cmd/actionlint@latest
      - run: ~/go/bin/actionlint
